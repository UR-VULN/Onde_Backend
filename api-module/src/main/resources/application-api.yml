spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}          # 구글 클라이언트 ID 입력
            client-secret: ${GOOGLE_CLIENT_SECRET}  # 구글 클라이언트 시크릿 입력
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}          # 카카오 REST API 키 입력
            client-secret: ${KAKAO_CLIENT_SECRET}  # 카카오 클라이언트 시크릿 입력
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

encryption:
  aes:
    # 32바이트(256비트) 길이의 임의 문자열
    secret-key: ${AES_SECRET_KEY:ThisIsLocalTestSecretKey12345678}

nts:
  api:
    # 공공데이터포털에서 발급받은 서비스 키 입력
    service-key: ${NTS_SERVICE_KEY:bcc245843d38537ad3234fdfe90c19bbb93582d89c482eef060a2cfc4b17c476}
    url: "https://api.odcloud.kr/api/nts-businessman/v1/status"