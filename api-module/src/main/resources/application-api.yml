spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}          # 구글 클라이언트 ID 입력
            client-secret: ${GOOGLE_CLIENT_SECRET}  # 구글 클라이언트 시크릿 입력
            scope:
              - email
              - profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}          # 카카오 REST API 키 입력
            client-secret: ${KAKAO_CLIENT_SECRET}  # 카카오 클라이언트 시크릿 입력
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

encryption:
  aes:
    # 32바이트(256비트) 길이의 임의 문자열
    secret-key: ${AES_SECRET_KEY}

nts:
  api:
    # 공공데이터포털에서 발급받은 서비스 키 입력
    service-key: ${NTS_SERVICE_KEY:}
    url: ${NTS_API_URL:https://api.odcloud.kr/api/nts-businessman/v1/validate}
    allowed-hosts: ${NTS_API_ALLOWED_HOSTS:api.odcloud.kr}

# CORS — 운영 기본: 실서비스 도메인만. localhost는 local/dev 프로필에서만 추가됩니다.
onde:
  cors:
    allow-localhost: false
    production-origin-patterns:
      - https://*.onde.click
    local-origins:
      - http://localhost:5173
      - http://localhost:3000
  auth:
    cookie:
      secure: true
      same-site: None
  security:
    login:
      max-failed-attempts: 5
      lock-minutes: 30

app:
  frontend-url: https://onde.click

security:
  diagnosis:
    sandbox:
      enabled: ${SECURITY_DIAGNOSIS_SANDBOX_ENABLED:false}

---
spring:
  config:
    activate:
      on-profile: local | dev

onde:
  cors:
    allow-localhost: true
  auth:
    cookie:
      secure: false
      same-site: Lax

app:
  frontend-url: http://localhost:5173
