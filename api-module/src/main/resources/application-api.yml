spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_GOOGLE_CLIENT_ID          # 구글 클라이언트 ID 입력
            client-secret: YOUR_GOOGLE_CLIENT_SECRET  # 구글 클라이언트 시크릿 입력
            scope:
              - email
              - profile
          kakao:
            client-id: YOUR_KAKAO_CLIENT_ID          # 카카오 REST API 키 입력
            client-secret: YOUR_KAKAO_CLIENT_SECRET  # 카카오 Client Secret 입력
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - account_email
              - profile_nickname
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id